services:
  aggregator:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/stats')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  publisher:
    build: .
    depends_on:
      aggregator:
        condition: service_healthy
    command: ["python3", "-m", "src.publisher", "http://aggregator:8080", "5000", "0.2"]
    networks:
      - internal

networks:
  internal:
    driver: bridge
